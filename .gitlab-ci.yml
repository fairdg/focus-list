stages:
  - build
  - deploy

build-job:
  stage: build
  tags:
    - docker
  image: python:3.11-alpine
  cache:
    key: pip
    paths:
      - .cache/pip
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  script:
    - python -m pip install -r Api/requirements.txt
    - mkdir -p build/api build/web
    - cp -r Api/* build/api/
    - cp -r Web/* build/web/
    - python -m compileall build/api
  artifacts:
    paths:
      - build/
    expire_in: 1 week

deploy-job:
  stage: deploy
  tags:
    - docker
  image: docker:24.0.7-cli
  before_script:
    - apk add --no-cache git docker-compose
  script:
    - cd /home/vboxuser/todolist
    - git pull
    - docker-compose down
    - docker-compose build
    - docker-compose up -d
  only:
    - master
