stages:
  - lint
  - test
  - build
  - deploy
  - notify

variables:
  DEPLOY_PATH: "/home/vboxuser/todolist"
  DOCKER_COMPOSE_FILE: "docker-compose.yml"

include :
  - local: "ci/template.yml"
# .notify-template:
#   stage: notify
#   image: curlimages/curl:8.6.0
#   needs:
#     - deploy-job
#   only:
#     - master

build-job:
  stage: build
  tags:
    - docker
  image: python:3.11-alpine
  cache:
    key: pip
    paths:
      - .cache/pip
  variables:
    PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  script:
    - python -m pip install -r Api/requirements.txt
    - mkdir -p build/api build/web
    - cp -r Api/* build/api/
    - cp -r Web/* build/web/
    - python -m compileall build/api
  artifacts:
    paths:
      - build/
    expire_in: 1 week

lint-job:
  stage: lint
  image: python:3.11-alpine
  script:
    - python -m pip install --no-cache-dir ruff
    - ruff check Api

unit-tests:
  stage: test
  image: python:3.11-alpine
  script:
    - python -m pip install --no-cache-dir -r Api/requirements.txt pytest
    - export PYTHONPATH="$CI_PROJECT_DIR"
    - pytest -q

deploy-job:
  stage: deploy
  tags:
    - docker
  image: docker:24.0.7-cli
  environment:
    name: production
  needs:
    - build-job
  before_script:
    - apk add --no-cache git docker-compose
  script:
    - cd "$DEPLOY_PATH"
    - git config --global --add safe.directory "$DEPLOY_PATH"
    - git pull "$CI_REPOSITORY_URL" "$CI_COMMIT_REF_NAME"
    - docker-compose -f "$DOCKER_COMPOSE_FILE" down
    - docker-compose -f "$DOCKER_COMPOSE_FILE" build
    - docker-compose -f "$DOCKER_COMPOSE_FILE" up -d
  only:
    - master

notify-success:
  extends: .notify-template
  script:
    - STATUS=success sh scripts/notify_telegram.sh
  when: on_success

notify-failure:
  extends: .notify-template
  script:
    - STATUS=failure sh scripts/notify_telegram.sh
  when: on_failure
